<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daniel Balaș — Fan Website</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Smartsupp Live Chat -->
  <script type="text/javascript">
    var _smartsupp = _smartsupp || {};
    _smartsupp.key = 'YOUR_REAL_SMARTSUPP_KEY_HERE';   // ← Replace with your actual Smartsupp key
    window.smartsupp||(function(d) {
      var s,c,o=smartsupp=function(){ o._.push(arguments)};o._=[];
      s=d.createElement('script');s.type='text/javascript';s.charset='utf-8';s.async=true;
      s.src='https://www.smartsuppchat.com/loader.js?';c=d.getElementsByTagName('script')[0];
      c.parentNode.insertBefore(s,c);
    })(document);
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#d4a017',
            dark: '#080808',
            light: '#d5cfc7'
          },
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    body { background: #080808; color: #d5cfc7; font-family: 'DM Sans', sans-serif; }
    .ggt { background: linear-gradient(135deg, #fbbf24, #d4a017); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: rgba(22,22,22,0.95); border: 1px solid rgba(212,160,23,0.2); transition: all 0.4s ease; }
    .card:hover { border-color: #d4a017; transform: translateY(-6px); }
    .btn-gold { background: linear-gradient(135deg, #d4a017, #b8860b); color: #000; font-weight: 600; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(212,160,23,0.4); }
    .btn-outline { border: 1px solid rgba(212,160,23,0.6); color: #d4a017; }
    .btn-outline:hover { background: rgba(212,160,23,0.1); }
  </style>
</head>
<body class="overflow-x-hidden">

<script>
// === IP-BASED LANGUAGE DETECTION & TRANSLATION ===
let currentLang = 'en'; // default: English (non-Romania)

const translations = {
  en: {
    title: "Daniel Balaș — Fan Website",
    navStory: "Story",
    navBook: "Book",
    navEvents: "Events",
    navMeet: "Meet & Greet",
    heroTag: "Former Priest • Creator • Author",
    heroQuote: "“Only when you start loving yourself the way God loves you, do you reveal the diamond of divinity within you.”",
    ctaMeet: "Meet & Greet",
    ctaStory: "His Story",
    storyTitle: "His Journey",
    bookTitle: "“The Truth Behind the Cassock”",
    meetTitle: "Meet & Greet",
    eventsTitle: "Upcoming Events",
    bookNow: "Book Now"
  },
  ro: {
    title: "Daniel Balaș — Website Fan",
    navStory: "Povestea",
    navBook: "Carte",
    navEvents: "Evenimente",
    navMeet: "Meet & Greet",
    heroTag: "Fost Preot • Creator de Conținut • Scriitor",
    heroQuote: "“Doar când începi să te iubești așa cum te iubește Dumnezeu, îți scoți la lumină diamantul dumnezeirii din tine.”",
    ctaMeet: "Meet & Greet",
    ctaStory: "Descoperă Povestea",
    storyTitle: "Drumul Său",
    bookTitle: "“Adevărul din spatele sutanei”",
    meetTitle: "Întâlnire cu Daniel",
    eventsTitle: "Evenimente Viitoare",
    bookNow: "Rezervă Acum"
  }
};

function applyLanguage(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.title = translations[lang].title;

  // Update navigation
  const navLinks = document.querySelectorAll('.nav-link');
  navLinks[0].textContent = translations[lang].navStory;
  navLinks[1].textContent = translations[lang].navBook;
  navLinks[2].textContent = translations[lang].navEvents;
  navLinks[3].textContent = translations[lang].navMeet;

  // You can add more selectors here for other texts (hero, headings, etc.)
}

// Detect if visitor is from Romania
async function detectCountry() {
  try {
    const response = await fetch('https://ipapi.co/json/');
    const data = await response.json();
    
    if (data.country_code === 'RO') {
      applyLanguage('ro');
      if (typeof smartsupp === 'function') smartsupp('language', 'ro');
    } else {
      applyLanguage('en');
      if (typeof smartsupp === 'function') smartsupp('language', 'en');
    }
  } catch (err) {
    // Fallback: show English if detection fails
    applyLanguage('en');
    if (typeof smartsupp === 'function') smartsupp('language', 'en');
  }
}

// Open Smartsupp with correct language message
function openChat(englishMsg) {
  let message = englishMsg;
  
  if (currentLang === 'ro') {
    // Simple translation for common phrases (expand as needed)
    message = englishMsg
      .replace('Hello!', 'Bună ziua!')
      .replace('I would like to book', 'Vreau să rezerv')
      .replace('I want to', 'Vreau să');
  }

  if (typeof smartsupp === 'function') {
    smartsupp('chat:open');
    if (message) smartsupp('chat:message', message);
  } else {
    alert("Chat opening...\n\n" + message);
  }
}

// Initialize on load
window.addEventListener('load', detectCountry);
</script>

<!-- NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-[#080808]/95 backdrop-blur-md border-b border-gold/20">
  <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
    <a href="#" class="flex items-center gap-3">
      <span class="w-8 h-8 border border-gold/50 flex items-center justify-center rounded">
        <i class="fas fa-cross text-gold text-sm"></i>
      </span>
      <span class="font-display text-2xl font-bold ggt tracking-wider">Daniel Balaș</span>
    </a>
    
    <div class="hidden md:flex items-center gap-8 text-sm uppercase tracking-widest">
      <a href="#story" class="nav-link hover:text-gold transition-colors">Story</a>
      <a href="#book" class="nav-link hover:text-gold transition-colors">Book</a>
      <a href="#events" class="nav-link hover:text-gold transition-colors">Events</a>
      <a href="#meet" class="nav-link hover:text-gold transition-colors">Meet & Greet</a>

    <button onclick="openChat('Hello! I would like to book an appearance with Daniel Balaș.')" 
            class="btn-gold px-6 py-3 rounded text-sm flex items-center gap-2">
      <i class="fas fa-calendar-check"></i>
      <span id="bookNowBtn">Book Now</span>
    </button>
  </div>
</nav>

<!-- HERO (English by default - will be updated via JS if Romanian) -->
<section class="min-h-screen flex items-center pt-20 bg-gradient-to-br from-black via-[#0a0800] to-black">
  <div class="max-w-4xl mx-auto px-6 text-center">
    <p id="heroTag" class="uppercase tracking-[0.25em] text-gold text-sm mb-6">Former Priest • Creator • Author</p>
    
    <h1 class="font-display text-7xl md:text-[5.5rem] font-black leading-none mb-8">
      Daniel<br><span class="ggt">Balaș</span>
    </h1>
    
    <p id="heroQuote" class="max-w-lg mx-auto text-xl text-light/70 italic mb-12">
      “Only when you start loving yourself the way God loves you, do you reveal the diamond of divinity within you.”
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <button onclick="openChat('Hello! I want to book a Meet & Greet with Daniel.')" 
              class="btn-gold px-10 py-5 text-lg flex items-center justify-center gap-3">
        <i class="fas fa-handshake"></i> <span id="ctaMeet">Meet & Greet</span>
      </button>
      <a href="#story" class="btn-outline px-10 py-5 text-lg flex items-center justify-center gap-3 hover:bg-white/5">
        <span id="ctaStory">His Story</span> <i class="fas fa-arrow-down"></i>
      </a>
    </div>
  </div>
</section>

</html>
