<script>
// === LANGUAGE & TRANSLATION SYSTEM ===
let isRomanian = false;

const translations = {
  en: {
    title: "Daniel Balaș — Fan Website",
    navStory: "Story",
    navBook: "Book",
    navEvents: "Events",
    navMeet: "Meet & Greet",
    heroTag: "Former Priest • Creator • Author",
    heroQuote: "“Only when you start loving yourself the way God loves you, do you reveal the diamond of divinity within you.”",
    ctaMeet: "Meet & Greet",
    ctaStory: "His Story",
    storyTitle: "His Journey",
    bookTitle: "“The Truth Behind the Cassock”",
    meetTitle: "Meet & Greet",
    eventsTitle: "Upcoming Events"
    // Add more keys if you expand the site
  },
  ro: {
    title: "Daniel Balaș — Website Fan",
    navStory: "Povestea",
    navBook: "Carte",
    navEvents: "Evenimente",
    navMeet: "Meet & Greet",
    heroTag: "Fost Preot • Creator de Conținut • Scriitor",
    heroQuote: "“Doar când începi să te iubești așa cum te iubește Dumnezeu, îți scoți la lumină diamantul dumnezeirii din tine.”",
    ctaMeet: "Meet & Greet",
    ctaStory: "Descoperă Povestea",
    storyTitle: "Drumul Său",
    bookTitle: "“Adevărul din spatele sutanei”",
    meetTitle: "Întâlnire cu Daniel",
    eventsTitle: "Evenimente Viitoare"
  }
};

function setLanguage(lang) {
  isRomanian = (lang === 'ro');
  document.documentElement.lang = lang;
  document.title = translations[lang].title;

  // Update visible texts (you can expand this for more elements)
  const navLinks = document.querySelectorAll('.nav-link');
  if (navLinks.length) {
    navLinks[0].textContent = translations[lang].navStory;
    navLinks[1].textContent = translations[lang].navBook;
    navLinks[2].textContent = translations[lang].navEvents;
    navLinks[3].textContent = translations[lang].navMeet;
  }

  // You can add more DOM updates here as needed
}

// Detect country from IP and set language + Smartsupp
async function detectCountryAndLanguage() {
  try {
    const res = await fetch('https://ipapi.co/json/');
    const data = await res.json();
    
    if (data.country_code === 'RO') {
      setLanguage('ro');
      
      // Set Smartsupp to Romanian
      if (typeof smartsupp === 'function') {
        smartsupp('language', 'ro');
      }
    } else {
      setLanguage('en');
      if (typeof smartsupp === 'function') {
        smartsupp('language', 'en');
      }
    }
  } catch (e) {
    // Fallback to English if detection fails
    setLanguage('en');
    if (typeof smartsupp === 'function') {
      smartsupp('language', 'en');
    }
  }
}

// Open Smartsupp with language-appropriate message
function openChat(baseMessage) {
  const message = isRomanian 
    ? baseMessage.replace(/Hello!/g, 'Bună ziua!').replace(/I want/g, 'Vreau') 
    : baseMessage;

  if (typeof smartsupp === 'function') {
    smartsupp('chat:open');
    if (message) smartsupp('chat:message', message);
  } else {
    alert("Chat is opening...\n\n" + message);
  }
}

// Initialize
window.addEventListener('load', () => {
  detectCountryAndLanguage();
});
</script>
